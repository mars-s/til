name: TilApp
options:
  bundleIdPrefix: com.til
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  TilApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TilApp
    resources:
      - path: TilApp/Assets.xcassets
    info:
      path: TilApp/Info.plist
      properties:
        CFBundleDisplayName: Til
        CFBundleIdentifier: com.til.app
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.til.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
